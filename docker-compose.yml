version: "3.9"

services:

  # ── PostgreSQL  PostGIS ───────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: bogota_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bogota_map
      POSTGRES_USER:     bogota_user
      POSTGRES_PASSWORD: bogota_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bogota_user -d bogota_map"]
      interval: 5s
      timeout: 5s
      retries: 20

  loader:
    image: iboates/osm2pgsql:latest
    container_name: bogota_loader
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: bogota_pass
    volumes:
      - ./data:/data
      - ./init:/init
    command: >
      sh -c "
        if [ ! -f /data/bogota.osm.pbf ]; then
          echo '[loader] bogota.osm.pbf no encontrado. Ejecuta: bash scripts/01_preparar_datos.sh';
          exit 0;
        fi;
        echo '[loader] Cargando bogota.osm.pbf…';
        osm2pgsql --host db --port 5432 --username bogota_user --database bogota_map \
          --slim --hstore --number-processes 4 /data/bogota.osm.pbf &&
        psql -h db -U bogota_user -d bogota_map -f /init/02_crear_vistas.sql &&
        echo '[loader] Carga completa.'
      "

  # ── OSRM — Motor de rutas (perfil vehículo) ────────────────────────────────
  osrm-car:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: bogota_osrm_car
    restart: unless-stopped
    ports:
      - "5010:5000"
    volumes:
      - ./data/osrm:/data
    command: >
      sh -c "
        if [ ! -f /data/bogota.osrm ]; then
          echo '[osrm-car] bogota.osrm no encontrado. Ejecuta: bash scripts/02_preparar_osrm.sh';
          sleep infinity;
        fi;
        osrm-routed --algorithm mld --port 5000 /data/bogota.osrm
      "

  # ── OSRM — Motor de rutas (perfil caminata) ────────────────────────────────
  osrm-foot:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: bogota_osrm_foot
    restart: unless-stopped
    ports:
      - "5011:5000"
    volumes:
      - ./data/osrm-foot:/data
    command: >
      sh -c "
        if [ ! -f /data/bogota.osrm ]; then
          echo '[osrm-foot] bogota.osrm no encontrado. Ejecuta: bash scripts/02_preparar_osrm.sh';
          sleep infinity;
        fi;
        osrm-routed --algorithm mld --port 5000 /data/bogota.osrm
      "

  # ── Martin — Vector Tile Server ────────────────────────────────────────────
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: bogota_martin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./martin/config.yaml:/config.yaml
    environment:
      MARTIN_CORS_ALLOWED_ORIGINS: "*"
    command: ["--config", "/config.yaml"]

  # ── FastAPI app ────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: bogota_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      martin:
        condition: service_started
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL:  postgresql://bogota_user:bogota_pass@db:5432/bogota_map
      # MARTIN_PUBLIC apunta a localhost porque el BROWSER (no el servidor)
      # es quien llama a Martin para los tiles. En producción cambiar por
      # el dominio/IP pública del servidor.
      MARTIN_PUBLIC: http://localhost:3000
      # FIX: URLs internas Docker para routing server-side (si se usara)
      # El routing se hace desde el BROWSER, así que apuntan a los puertos
      # expuestos en el host.
      OSRM_CAR_URL:  http://localhost:5010
      OSRM_FOOT_URL: http://localhost:5011
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app

volumes:
  pgdata:
